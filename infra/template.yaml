AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: TaskSync AWS serverless backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref TaskSyncTable

Resources:
  ServerlessRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      AlwaysDeploy: true
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  TaskSyncTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TaskSyncTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  CorsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/cors/handler.handler
      Events:
        OptionsBoards:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards
            Method: OPTIONS
        OptionsBoardById:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}
            Method: OPTIONS
        OptionsTasks:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks
            Method: OPTIONS
        OptionsTaskById:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: OPTIONS

  BoardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/boards/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskSyncTable
      Events:
        CreateBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards
            Method: POST
        GetBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}
            Method: GET

  TasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/tasks/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskSyncTable
      Events:
        CreateTask:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks
            Method: POST
        UpdateTask:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: PUT
        DeleteTask:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: DELETE

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"