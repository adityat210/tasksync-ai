AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: TaskSync AWS serverless backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref TaskSyncTable
        WS_API_ENDPOINT: !Sub "https://${RealtimeApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
        UPSTASH_REDIS_REST_URL: "https://solid-glowworm-88703.upstash.io"
        UPSTASH_REDIS_REST_TOKEN: "gQAAAAAAAVp_AAIgcDEwMGY4OWM2NTUyMTc0OTlkYjg2YWFmMWM0MWNiNzA3MA"
        HUGGINGFACE_API_TOKEN: ""
Resources:
  SearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/search/handler.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TaskSyncTable
      Events:
        SearchTasks:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /search
            Method: GET

  TaskSyncUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: TaskSyncUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false

  TaskSyncUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: TaskSyncWebClient
      UserPoolId: !Ref TaskSyncUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  ServerlessRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      AlwaysDeploy: true
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  RealtimeApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: TaskSyncRealtimeApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  RealtimeConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RealtimeApi
      RouteKey: $connect
      Target: !Sub "integrations/${RealtimeIntegration}"

  RealtimeDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RealtimeApi
      RouteKey: $disconnect
      Target: !Sub "integrations/${RealtimeIntegration}"

  RealtimeIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RealtimeApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RealtimeFunction.Arn}/invocations
        - {}

  RealtimeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/realtime/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskSyncTable

  RealtimePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref RealtimeFunction
      Principal: apigateway.amazonaws.com

  RealtimeDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - RealtimeConnectRoute
      - RealtimeDisconnectRoute
    Properties:
      ApiId: !Ref RealtimeApi

  RealtimeStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref RealtimeApi
      StageName: Prod
      DeploymentId: !Ref RealtimeDeployment

  CommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/comments/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskSyncTable
      Events:
        CreateComment:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /tasks/{taskId}/comments
            Method: POST
        ListComments:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /tasks/{taskId}/comments
            Method: GET
  
  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/users/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskSyncTable
      Events:
        CreateUser:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /users
            Method: POST
        AddWorkspaceMember:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces/{workspaceId}/members
            Method: POST
        ListWorkspaceMembers:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces/{workspaceId}/members
            Method: GET

  TaskSyncTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TaskSyncTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  CorsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/cors/handler.handler
      Events:
        OptionsAnalyzeTask:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /tasks/analyze
            Method: OPTIONS
        OptionsSearch:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /search
            Method: OPTIONS
        OptionsBoards:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards
            Method: OPTIONS
        OptionsBoardById:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}
            Method: OPTIONS
        OptionsTasks:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks
            Method: OPTIONS
        OptionsTaskById:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: OPTIONS
        OptionsWorkspaces:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces
            Method: OPTIONS
        OptionsWorkspaceById:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces/{workspaceId}
            Method: OPTIONS
        OptionsWorkspaceBoards:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces/{workspaceId}/boards
            Method: OPTIONS
        OptionsUsers:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /users
            Method: OPTIONS
        OptionsWorkspaceMembers:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces/{workspaceId}/members
            Method: OPTIONS
        OptionsComments:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /tasks/{taskId}/comments
            Method: OPTIONS


  WorkspacesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/workspaces/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskSyncTable
      Events:
        CreateWorkspace:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces
            Method: POST
        GetWorkspace:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces/{workspaceId}
            Method: GET

  BoardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/boards/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskSyncTable
      Events:
        CreateBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards
            Method: POST
        GetBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}
            Method: GET
        CreateWorkspaceBoard:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces/{workspaceId}/boards
            Method: POST
        ListWorkspaceBoards:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /workspaces/{workspaceId}/boards
            Method: GET

  TasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/tasks/handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskSyncTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RealtimeApi}/Prod/POST/@connections/*"
      Events:
        CreateTask:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks
            Method: POST
        UpdateTask:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: PUT
        DeleteTask:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: DELETE
  AnalyzeTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: dist/functions/tasks/analyze.handler
      Timeout: 30
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TaskSyncTable
      Events:
        AnalyzeTask:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessRestApi
            Path: /tasks/analyze
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  WebSocketUrl:
    Description: WebSocket endpoint URL
    Value: !Sub "wss://${RealtimeApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref TaskSyncUserPool
  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref TaskSyncUserPoolClient