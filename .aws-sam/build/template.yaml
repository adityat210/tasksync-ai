AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TaskSync AWS serverless backend
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME:
          Ref: TaskSyncTable
Resources:
  ServerlessRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      AlwaysDeploy: true
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowOrigin: '''*'''
  RealtimeApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: TaskSyncRealtimeApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action
  RealtimeConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: RealtimeApi
      RouteKey: $connect
      Target:
        Fn::Sub: integrations/${RealtimeIntegration}
  RealtimeDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: RealtimeApi
      RouteKey: $disconnect
      Target:
        Fn::Sub: integrations/${RealtimeIntegration}
  RealtimeIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Ref: RealtimeApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub:
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RealtimeFunction.Arn}/invocations
        - {}
  RealtimeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: RealtimeFunction
      Handler: dist/functions/realtime/handler.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TaskSyncTable
    Metadata:
      SamResourceId: RealtimeFunction
  RealtimePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Ref: RealtimeFunction
      Principal: apigateway.amazonaws.com
  RealtimeDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
    - RealtimeConnectRoute
    - RealtimeDisconnectRoute
    Properties:
      ApiId:
        Ref: RealtimeApi
  RealtimeStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId:
        Ref: RealtimeApi
      StageName: Prod
      DeploymentId:
        Ref: RealtimeDeployment
  CommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CommentsFunction
      Handler: dist/functions/comments/handler.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TaskSyncTable
      Events:
        CreateComment:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /tasks/{taskId}/comments
            Method: POST
        ListComments:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /tasks/{taskId}/comments
            Method: GET
    Metadata:
      SamResourceId: CommentsFunction
  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UsersFunction
      Handler: dist/functions/users/handler.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TaskSyncTable
      Events:
        CreateUser:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /users
            Method: POST
        AddWorkspaceMember:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces/{workspaceId}/members
            Method: POST
        ListWorkspaceMembers:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces/{workspaceId}/members
            Method: GET
    Metadata:
      SamResourceId: UsersFunction
  TaskSyncTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TaskSyncTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
  CorsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CorsFunction
      Handler: dist/functions/cors/handler.handler
      Events:
        OptionsBoards:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards
            Method: OPTIONS
        OptionsBoardById:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards/{boardId}
            Method: OPTIONS
        OptionsTasks:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards/{boardId}/tasks
            Method: OPTIONS
        OptionsTaskById:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: OPTIONS
        OptionsWorkspaces:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces
            Method: OPTIONS
        OptionsWorkspaceById:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces/{workspaceId}
            Method: OPTIONS
        OptionsWorkspaceBoards:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces/{workspaceId}/boards
            Method: OPTIONS
        OptionsUsers:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /users
            Method: OPTIONS
        OptionsWorkspaceMembers:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces/{workspaceId}/members
            Method: OPTIONS
        OptionsComments:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /tasks/{taskId}/comments
            Method: OPTIONS
    Metadata:
      SamResourceId: CorsFunction
  WorkspacesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: WorkspacesFunction
      Handler: dist/functions/workspaces/handler.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TaskSyncTable
      Events:
        CreateWorkspace:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces
            Method: POST
        GetWorkspace:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces/{workspaceId}
            Method: GET
    Metadata:
      SamResourceId: WorkspacesFunction
  BoardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: BoardsFunction
      Handler: dist/functions/boards/handler.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TaskSyncTable
      Events:
        CreateBoard:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards
            Method: POST
        GetBoard:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards/{boardId}
            Method: GET
        CreateWorkspaceBoard:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces/{workspaceId}/boards
            Method: POST
        ListWorkspaceBoards:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /workspaces/{workspaceId}/boards
            Method: GET
    Metadata:
      SamResourceId: BoardsFunction
  TasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: TasksFunction
      Handler: dist/functions/tasks/handler.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TaskSyncTable
      Events:
        CreateTask:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards/{boardId}/tasks
            Method: POST
        UpdateTask:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: PUT
        DeleteTask:
          Type: Api
          Properties:
            RestApiId:
              Ref: ServerlessRestApi
            Path: /boards/{boardId}/tasks/{taskId}
            Method: DELETE
    Metadata:
      SamResourceId: TasksFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
  WebSocketUrl:
    Description: WebSocket endpoint URL
    Value:
      Fn::Sub: wss://${RealtimeApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
